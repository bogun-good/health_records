<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 관리 달력</title>

<style>
:root{
    --border-color:#dee2e6;
    --holiday-color:#dc3545; /* 휴일 빨간색 */
    --saturday-color:#0d6efd; /* 토요일 파란색 */
    --light-blue:#e7f1ff;
    --point-green:#28a745;
    --soft-blue:#cfe2ff;
    --soft-blue-hover:#b6d4fe;
    --btn-text-blue:#084298;
}

*{ box-sizing:border-box; }

body{
    font-family:'Pretendard','Malgun Gothic',sans-serif;
    background:#f1f3f5;
    margin:0;
    padding:20px;
}

.main-container{
    display:flex;
    gap:20px;
    max-width:1400px;
    margin:auto;
    align-items:flex-start;
}

.calendar-section{ flex:1; }

/* 입력창 영역 */
.external-input-area{
    width:280px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    position:sticky;
    top:20px;
}

.external-input-area h3{ margin-top:0; font-size: 1.2rem; }

.external-input-area label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-weight:bold;
}

.external-input-area input{
    width:100%;
    padding:12px;
    border:1px solid var(--border-color);
    border-radius:5px;
    font-size: 1rem;
}

.add-btn{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:var(--soft-blue);
    color:var(--btn-text-blue);
    font-weight:bold;
    cursor:pointer;
    transition: 0.2s;
}

.add-btn:hover{ background:var(--soft-blue-hover); }

/* 달력 헤더 */
.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:15px 20px;
    border-radius:10px;
    margin-bottom:20px;
}

.year-text{ color:var(--point-green); margin-right:20px; font-weight: bold; }
.month-text{ color:var(--point-green); font-weight: bold; }

.nav-btn{
    padding:8px 16px;
    border:1px solid #cfe2ff;
    background:var(--light-blue);
    color:#084298;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

/* 달력 그리드 */
.calendar-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    background:white;
    border-top:1px solid var(--border-color);
    border-left:1px solid var(--border-color);
}

.day-label{
    padding:12px;
    text-align:center;
    font-weight:bold;
    background:var(--light-blue);
    border-right:1px solid var(--border-color);
    border-bottom:1px solid var(--border-color);
}

.day-label:nth-child(1){ color:var(--holiday-color); }
.day-label:nth-child(7){ color:var(--saturday-color); }

.calendar-day{
    min-height:130px;
    padding:8px;
    border-right:1px solid var(--border-color);
    border-bottom:1px solid var(--border-color);
    display:flex;
    flex-direction:column;
    background: white;
    cursor: pointer; /* 클릭 가능 표시 */
}

.calendar-day:hover{ background:#fdfdfd; box-shadow: inset 0 0 0 2px var(--soft-blue); }

.day-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 5px;
    pointer-events: none; /* 클릭 이벤트 방해 금지 */
}

.day-number{ font-size:1.1rem; font-weight:bold; }

/* 휴일 강조색 */
.holiday .day-number,
.holiday .holiday-name { color:var(--holiday-color) !important; }
.saturday .day-number{ color:var(--saturday-color); }

.holiday-name{ font-size:0.72rem; font-weight: normal; text-align: right; }

/* 일정 목록 */
.event-list{ display:flex; flex-direction:column; gap:4px; margin-top: 5px; }

.event-item{
    background:#f8f9fa;
    border-left:3px solid #adb5bd;
    padding:4px 6px;
    border-radius:4px;
    font-size:0.8rem;
    color: #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.event-item:hover { background: #e9ecef; }
.event-text { flex: 1; word-break: break-all; }

.event-btns { display: flex; gap: 4px; margin-left: 5px; }

.action-btn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.8rem;
    padding: 2px;
    color: #bbb;
    transition: 0.2s;
}

.action-btn:hover { color: #333; }
.delete-btn:hover { color: var(--holiday-color); }

@media (max-width:1000px){
    .main-container{ flex-direction:column; }
    .external-input-area{ width:100%; position:static; }
}
</style>
</head>

<body>

<div class="main-container">
    <div class="calendar-section">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">◀ 이전 달</button>
            <h2 id="monthDisplay"></h2>
            <button class="nav-btn" onclick="changeMonth(1)">다음 달 ▶</button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="day-label">일</div>
            <div class="day-label">월</div>
            <div class="day-label">화</div>
            <div class="day-label">수</div>
            <div class="day-label">목</div>
            <div class="day-label">금</div>
            <div class="day-label">토</div>
        </div>
    </div>

    <!-- 입력창 및 저장 유지 설명 -->
    <div class="external-input-area">
        <h3>일정 등록</h3>
        <label for="inputDate">날짜 선택</label>
        <input type="date" id="inputDate">
        
        <label for="inputText">할 일 입력</label>
        <input type="text" id="inputText" placeholder="내용 입력 후 엔터를 치세요" onkeypress="handleEnter(event)">
        
        <button class="add-btn" onclick="addEventFromExternal()">일정 추가하기</button>
        
        <div style="font-size: 0.85rem; color: #666; margin-top: 20px; line-height: 1.5;">
            <p>✔ <strong>달력 날짜</strong>를 클릭하면 선택됩니다.</p>
            <p>✔ <strong>엔터 키</strong>를 누르면 바로 저장됩니다.</p>
            <p>✔ 작성된 내용은 <strong>자동 저장</strong>됩니다.</p>
        </div>
    </div>
</div>

<script>
// 현재 날짜 설정 (2026년 이전이면 2026년으로 고정)
let currentDate = new Date();
if(currentDate.getFullYear() < 2026) currentDate = new Date(2026, 0, 1);

// 로컬스토리지에서 데이터 불러오기
let events = JSON.parse(localStorage.getItem('calendarEvents')) || {};

// 음력 공휴일 고정 데이터 (2026년 ~ 2040년 천문연 공리 기준 반영)
const LUNAR_HOLIDAYS = {
    2026: { seollal:'2026-02-17', buddha:'2026-05-24', chuseok:'2026-09-25' },
    2027: { seollal:'2027-02-07', buddha:'2027-05-13', chuseok:'2027-09-15' },
    2028: { seollal:'2028-01-27', buddha:'2028-05-02', chuseok:'2028-10-03' },
    2029: { seollal:'2029-02-13', buddha:'2029-05-20', chuseok:'2029-09-22' },
    2030: { seollal:'2030-02-03', buddha:'2030-05-09', chuseok:'2030-09-12' },
    2031: { seollal:'2031-01-23', buddha:'2031-05-28', chuseok:'2031-10-01' },
    2032: { seollal:'2032-02-11', buddha:'2032-05-16', chuseok:'2032-09-19' },
    2033: { seollal:'2033-01-31', buddha:'2033-06-05', chuseok:'2033-09-08' }, // 2033년 추석 날짜 수정 반영
    2034: { seollal:'2034-02-19', buddha:'2034-05-25', chuseok:'2034-09-27' },
    2035: { seollal:'2035-02-08', buddha:'2035-05-15', chuseok:'2035-09-16' },
    2036: { seollal:'2036-01-28', buddha:'2036-05-02', chuseok:'2036-10-04' },
    2037: { seollal:'2037-02-15', buddha:'2037-05-22', chuseok:'2037-09-24' },
    2038: { seollal:'2038-02-04', buddha:'2038-05-11', chuseok:'2038-09-13' },
    2039: { seollal:'2039-01-24', buddha:'2039-04-30', chuseok:'2039-10-02' },
    2040: { seollal:'2040-02-12', buddha:'2040-05-18', chuseok:'2040-09-21' }
};

/* 공통 유틸리티 */
function formatDate(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function dateToString(date){ return formatDate(date.getFullYear(), date.getMonth()+1, date.getDate()); }
function addDays(dateStr, days){
    const date = new Date(dateStr);
    date.setDate(date.getDate() + days);
    return dateToString(date);
}

/* 대한민국 법정 공휴일 지정 (양력 고정 휴일) */
function getFixedHolidays(year){
    const holidays = {
        [`${year}-01-01`]:"신정", [`${year}-03-01`]:"삼일절", [`${year}-05-05`]:"어린이날",
        [`${year}-06-06`]:"현충일", [`${year}-07-17`]:"제헌절", [`${year}-08-15`]:"광복절", // 제헌절 추가 반영
        [`${year}-10-03`]:"개천절", [`${year}-10-09`]:"한글날", [`${year}-12-25`]:"성탄절"
    };

    // 2026년 5월 1일부터 노동절을 공휴일로 지정 반영
    if (year >= 2026) {
        holidays[`${year}-05-01`] = "노동절";
    }

    return holidays;
}

/* 음력 기반 공휴일 맵 생성 */
function getLunarHolidays(year){
    const h = {};
    const d = LUNAR_HOLIDAYS[year];
    if(!d) return h;
    h[addDays(d.seollal,-1)]="설날 연휴"; h[d.seollal]="설날"; h[addDays(d.seollal,1)]="설날 연휴";
    h[d.buddha]="부처님오신날";
    h[addDays(d.chuseok,-1)]="추석 연휴"; h[d.chuseok]="추석"; h[addDays(d.chuseok,1)]="추석 연휴";
    return h;
}

/* 법령 기준 정밀 대체공휴일 적용 알고리즘 */
function applySubstituteHolidays(year, hList){
    const result = { ...hList };
    
    // 날짜 순서대로 정렬하여 순차적으로 대체휴일 판정
    Object.keys(hList).sort().forEach(dateStr => {
        const date = new Date(dateStr);
        const day = date.getDay(); // 0: 일요일, 6: 토요일
        const name = hList[dateStr];
        
        const names = name.split(',').map(n => n.trim());
        const overlapCount = names.length - 1; // 한 날짜에 공휴일이 겹치는 횟수
        
        let subDaysNeeded = 0;
        
        names.forEach(n => {
            if (n === "신정" || n === "현충일") return; // 대체공휴일 적용 제외 항목
            
            if (n.includes("설날") || n.includes("추석")) {
                // 설날, 추석 연휴는 일요일과 겹치거나 다른 공휴일과 겹칠 때만 대체휴일 생성 (토요일 제외)
                if (day === 0) subDaysNeeded++;
            } else {
                // 국경일 4일, 어린이날, 부처님오신날, 성탄절, 노동절 등은 토요일/일요일/다른 공휴일과 겹치면 발생
                if (day === 0 || day === 6) subDaysNeeded++;
            }
        });
        
        // 공휴일끼리 겹쳤을 때 발생하는 대체공휴일 수 추가 (예: 개천절과 추석연휴 겹침 등)
        subDaysNeeded += overlapCount;
        
        // 필요한 대체공휴일 수만큼 다음 첫 번째 '비공휴일 평일'을 찾아 지정
        for (let i = 0; i < subDaysNeeded; i++) {
            let sDate = new Date(date);
            let found = false;
            while(!found) {
                sDate.setDate(sDate.getDate() + 1);
                let sStr = dateToString(sDate);
                // 주말(토,일)이 아니고, 기존 공휴일 및 이미 지정된 대체휴일이 아닌 날짜 탐색
                if(!result[sStr] && sDate.getDay() !== 0 && sDate.getDay() !== 6) {
                    result[sStr] = "대체 휴일";
                    found = true;
                }
            }
        }
    });
    return result;
}

/* 양력, 음력 공휴일을 하나로 통합 */
function getAllHolidays(year){
    let fixed = getFixedHolidays(year);
    let lunar = getLunarHolidays(year);
    let h = { ...fixed };
    
    // 중복 날짜 처리 (쉼표로 결합하여 매핑)
    Object.keys(lunar).forEach(dateStr => {
        if (h[dateStr]) {
            h[dateStr] = h[dateStr] + ", " + lunar[dateStr];
        } else {
            h[dateStr] = lunar[dateStr];
        }
    });
    
    return applySubstituteHolidays(year, h);
}

/* 달력 렌더링 */
function renderCalendar(){
    const grid = document.getElementById('calendarGrid');
    const monthDisplay = document.getElementById('monthDisplay');
    const labels = Array.from(document.querySelectorAll('.day-label'));
    grid.innerHTML='';
    labels.forEach(label => grid.appendChild(label));

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const holidays = getAllHolidays(year);
    monthDisplay.innerHTML = `<span class="year-text">${year}년</span><span class="month-text">${month+1}월</span>`;

    const firstDay = new Date(year,month,1).getDay();
    const daysInMonth = new Date(year,month+1,0).getDate();

    for(let i=0;i<firstDay;i++){ grid.appendChild(document.createElement('div')).className='calendar-day'; }

    for(let d=1; d<=daysInMonth; d++){
        const dateStr = formatDate(year, month+1, d);
        const dayOfWeek = new Date(year, month, d).getDay();
        const dayDiv = document.createElement('div');
        dayDiv.className='calendar-day';
        
        dayDiv.onclick = () => selectDate(dateStr);

        if(holidays[dateStr] || dayOfWeek === 0) dayDiv.classList.add('holiday');
        else if(dayOfWeek === 6) dayDiv.classList.add('saturday');

        dayDiv.innerHTML = `
            <div class="day-header">
                <span class="day-number">${d}</span>
                ${holidays[dateStr] ? `<span class="holiday-name">${holidays[dateStr]}</span>` : ''}
            </div>
            <div class="event-list"></div>
        `;

        const list = dayDiv.querySelector('.event-list');
        if(events[dateStr]){
            events[dateStr].forEach((text, i) => {
                const item = document.createElement('div');
                item.className = 'event-item';
                item.innerHTML = `
                    <span class="event-text">${text}</span>
                    <div class="event-btns">
                        <button class="action-btn" onclick="stopProp(event); editEvent('${dateStr}', ${i})">✎</button>
                        <button class="action-btn delete-btn" onclick="stopProp(event); deleteEvent('${dateStr}', ${i})">×</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }
        grid.appendChild(dayDiv);
    }
}

/* 이벤트 버블링 방지 */
function stopProp(e) { e.stopPropagation(); }

/* 날짜 선택 */
function selectDate(dateStr) {
    document.getElementById('inputDate').value = dateStr;
    document.getElementById('inputText').focus();
}

/* 일정 추가 */
function addEventFromExternal(){
    const date = document.getElementById('inputDate').value;
    const text = document.getElementById('inputText').value;
    if(!date) { alert("날짜를 먼저 선택해 주세요."); return; }
    if(!text.trim()) return;
    
    if(!events[date]) events[date]=[];
    events[date].push(text.trim());
    
    saveAndRender(); 
    document.getElementById('inputText').value='';
}

/* 엔터 키 감지 */
function handleEnter(e){ 
    if(e.key === 'Enter') {
        addEventFromExternal(); 
    }
}

/* 삭제 및 수정 */
function deleteEvent(date, index) {
    events[date].splice(index, 1);
    if(events[date].length === 0) delete events[date];
    saveAndRender();
}

function editEvent(date, index) {
    const newText = prompt("일정을 수정하세요:", events[date][index]);
    if(newText && newText.trim()) {
        events[date][index] = newText.trim();
        saveAndRender();
    }
}

/* 데이터 영구 저장 및 렌더링 */
function saveAndRender() {
    localStorage.setItem('calendarEvents', JSON.stringify(events));
    renderCalendar();
}

function changeMonth(v){ currentDate.setMonth(currentDate.getMonth()+v); renderCalendar(); }

// 초기 실행
renderCalendar();
</script>
</body>
</html>
